<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="color-scheme" content="light" />
<meta name="theme-color" content="#f4f4f9" />
<title>입이 트이는 영어 — 통암기 노트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html{background-color:#f4f4f9;color-scheme:only light;}
  :root{
    color-scheme:only light;
    /* 톤: 베이스는 C(맑은 연보라빛), 하루 블록은 A(따뜻한 종이) */
    --base:#f4f4f9; --ink:#322b21; --sub:#73748f;
    --card:#fbf6ec; --line:#ddcdac; --soft:#7c6e58; --gold:#b8893f;
    --violet:#8a5a7a; --violetSoft:#f2eaf0;
    --star:#e8a23d; --starSoft:#fdf3e2; --rose:#d9587f;
    --serif:'Gowun Batang',serif; --script:'Nanum Pen Script',cursive; --body:'Gowun Dodum',sans-serif;
  }
  body{font-family:var(--body);color:var(--ink);min-height:100vh;background:var(--base);padding-bottom:80px;word-break:keep-all;}

  /* ── 시그니처: 지금 시간의 하늘 ── */
  .sky{position:relative;overflow:hidden;padding:42px 20px 86px;border-radius:0 0 34px 34px;}
  .disc{position:absolute;right:12%;width:56px;height:56px;border-radius:50%;animation:drift 7s ease-in-out infinite;}
  .star-dot{position:absolute;border-radius:50%;background:#fff;animation:twinkle 3s ease-in-out infinite;}
  .sky-in{position:relative;max-width:620px;margin:0 auto;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.22em;color:rgba(255,255,255,.85);}
  .hello{font-family:var(--serif);font-weight:700;font-size:clamp(26px,6.8vw,36px);line-height:1.25;color:#fff;margin:10px 0 6px;text-shadow:0 2px 18px rgba(20,20,60,.25);}
  .sky-date{font-size:13.5px;color:rgba(255,255,255,.92);}
  .streak{margin-left:10px;font-weight:700;}

  .wrap{max-width:620px;margin:0 auto;padding:0 16px;}

  /* 요약 카드 (하늘 위에 떠 있음) */
  .summary{background:#fff;border-radius:20px;padding:15px 17px;margin-top:-52px;position:relative;box-shadow:0 14px 36px rgba(50,48,100,.14);display:flex;align-items:center;gap:11px;flex-wrap:wrap;}
  .summary .lbl{font-size:12px;color:var(--sub);}
  .summary .num{font-family:var(--serif);font-size:22px;font-weight:700;margin-top:2px;}
  .summary .num .st{color:var(--star);} .summary .num .tot{font-size:13px;color:var(--sub);font-weight:400;}
  .btn{border:none;border-radius:13px;padding:10px 15px;font-family:var(--body);font-size:13.5px;font-weight:700;cursor:pointer;transition:transform .14s ease;}
  .btn:active{transform:scale(.97);}
  .btn.review{border:1.5px solid var(--line);background:#fff;color:var(--soft);}
  .btn.review.on{border-color:var(--violet);background:var(--violet);color:#fff;}
  .btn.add{background:linear-gradient(135deg,#a8543a,#8c3f2c);color:#fff;box-shadow:0 8px 18px rgba(140,63,44,.3);}
  .hidewrap{display:none;width:100%;gap:7px;margin-top:4px;}
  .hidewrap.on{display:flex;}
  .hideopt{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:11px;padding:9px 0;font-family:var(--body);font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;transition:transform .14s ease;}
  .hideopt:active{transform:scale(.97);}
  .hideopt.on{border-color:var(--violet);background:var(--violetSoft);color:var(--violet);}

  .empty-state{text-align:center;color:var(--soft);font-size:13.5px;padding:44px 12px;margin-top:22px;border:2px dashed var(--line);border-radius:20px;background:var(--card);}

  /* ── 하루 블록 (디자인 A 스타일) ── */
  .day{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 15px 14px;margin-top:24px;box-shadow:0 4px 14px rgba(80,60,25,.08);transition:background .5s ease, box-shadow .5s ease, border-color .5s ease;}
  /* 그 날 별을 모두 모으면: 은은한 흰빛 카드 */
  .day.done{background:linear-gradient(165deg,#ffffff 0%,#fffdf6 100%);border-color:#efe6cf;box-shadow:0 6px 22px rgba(184,137,63,.14);}
  /* 오늘 + 전부 외움: 더 특별하게 (금빛 테두리 + 살짝 빛남) */
  .day.done.today{background:linear-gradient(165deg,#ffffff 0%,#fffaf0 100%);border-color:var(--star);box-shadow:0 0 0 1px var(--star), 0 8px 28px rgba(232,162,61,.22);animation:dayGlow 2.6s ease-in-out infinite;}
  .day.done.today .dhead h2{color:var(--star);}
  .daydone-badge{font-size:11px;font-weight:700;color:var(--star);background:var(--starSoft);border-radius:99px;padding:3px 9px;margin-left:2px;}
  @keyframes dayGlow{0%,100%{box-shadow:0 0 0 1px var(--star), 0 8px 28px rgba(232,162,61,.18);}50%{box-shadow:0 0 0 1px var(--star), 0 8px 34px rgba(232,162,61,.34);}}
  .dhead{display:flex;align-items:baseline;gap:9px;margin-bottom:16px;}
  .dhead h2{font-family:var(--serif);font-size:19px;font-weight:700;}
  .dtoggle{cursor:pointer;user-select:none;}
  .dtoggle .chev{font-size:12px;color:var(--soft);font-weight:400;margin-left:2px;}
  .day.collapsed .dhead{margin-bottom:0;}
  .dhead .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent);align-self:center;}
  .dhead .dstar{font-size:12.5px;color:var(--star);font-weight:700;}
  .dhead .del{border:none;background:transparent;color:#c2b594;cursor:pointer;font-size:12px;padding:2px;}
  .dtopic{font-size:13.5px;color:var(--soft);margin:-9px 0 15px;}

  .sents{display:grid;gap:8px;}
  .sent{border:1px solid var(--line);border-radius:12px;padding:11px 12px;background:#fffdf8;}
  .sent.mem{background:linear-gradient(160deg,#fffaf0,#fdf3e2);border-color:#ecd9b4;}
  .sent .en{font-size:15px;font-weight:600;line-height:1.55;letter-spacing:.1px;}
  .sent .en .ph{color:#c2b594;font-weight:400;}
  .sent .ko{font-size:13.5px;line-height:1.6;color:var(--soft);margin-top:5px;}
  .blurred{color:transparent !important;text-shadow:0 0 9px rgba(124,110,88,.62);cursor:pointer;user-select:none;}
  .blurred .ph{color:transparent;}
  .blurred .hint{color:var(--violet);text-shadow:none;font-size:12px;margin-left:6px;font-weight:400;}
  .sent .foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
  .editbtn{border:none;background:var(--starSoft);color:var(--star);font-family:var(--body);font-size:13px;font-weight:700;line-height:1;cursor:pointer;padding:8px 14px;border-radius:99px;transition:transform .14s ease;}
  .editbtn:active{transform:scale(.96);}
  .foot-left{display:flex;align-items:center;gap:7px;}
  .speakbtn{border:none;background:var(--starSoft);color:var(--star);font-family:var(--body);font-size:13px;font-weight:700;line-height:1;cursor:pointer;padding:8px 14px;border-radius:99px;transition:transform .14s ease;}
  .speakbtn:active{transform:scale(.96);}
  .speakbtn.playing{background:var(--violetSoft);color:var(--violet);}
  .membtn{border:none;border-radius:50%;width:34px;height:34px;font-size:17px;line-height:1;cursor:pointer;background:#f0ead9;color:#bdb091;transition:transform .14s ease;padding:0;}
  .membtn:active{transform:scale(.92);}
  .membtn.on{background:var(--starSoft);color:var(--star);}
  .membtn.on .pop{display:inline-block;animation:starPop .45s cubic-bezier(.2,.9,.3,1.4);}
  .addsent{border:2px dashed var(--line);border-radius:12px;padding:10px;font-family:var(--body);font-size:13px;color:#b9a986;background:transparent;cursor:pointer;}

  /* 휴지통 */
  .trash-wrap{margin-top:26px;}
  .trash-toggle{display:block;margin:0 auto;border:1px solid var(--line);background:rgba(255,255,255,.6);border-radius:999px;padding:8px 16px;font-family:var(--body);font-size:12.5px;color:var(--sub);cursor:pointer;}
  .trash-panel{margin-top:12px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 6px 20px rgba(50,48,100,.07);}
  .trash-actions{display:flex;gap:8px;margin-bottom:12px;}
  .trash-actions button{flex:1;border-radius:11px;padding:9px 0;font-family:var(--body);font-size:13px;font-weight:700;cursor:pointer;}
  .t-restore-all{border:1.5px solid var(--violet);background:var(--violetSoft);color:var(--violet);}
  .t-empty{border:1.5px solid #ecc9c2;background:#fceeea;color:var(--rose);}
  .trash-item{display:flex;align-items:center;gap:10px;padding:10px 4px;border-top:1px dashed var(--line);}
  .trash-item:first-of-type{border-top:none;}
  .trash-item .ti-main{flex:1;min-width:0;}
  .trash-item .ti-label{font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .trash-item .ti-sub{font-size:11px;color:var(--sub);margin-top:2px;}
  .trash-item .ti-restore{border:none;background:transparent;color:var(--violet);font-weight:700;font-size:13px;cursor:pointer;}
  .trash-item .ti-purge{border:none;background:transparent;color:var(--rose);font-weight:700;font-size:13px;cursor:pointer;}
  .pin-dots{letter-spacing:.3em;font-size:18px;text-align:center;color:var(--ink);}
  .footnote{text-align:center;color:#b6b6c9;font-size:11.5px;line-height:1.7;margin-top:32px;}
  .status{text-align:center;font-size:11px;color:var(--sub);margin-top:8px;}

  /* ── 모달 ── */
  .back{position:fixed;inset:0;background:rgba(25,25,55,.5);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:18px;z-index:60;}
  .back.on{display:flex;animation:fade .2s ease;}
  .modal{background:#fff;border-radius:22px;width:100%;max-width:400px;padding:22px;border:1px solid var(--line);box-shadow:0 30px 70px rgba(30,30,70,.4);animation:pop .28s cubic-bezier(.2,.9,.3,1.2);}
  .mtitle{font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:15px;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--soft);margin-bottom:6px;}
  .inp,.area{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;font-family:var(--body);font-size:14px;color:var(--ink);background:#fffdf8;outline:none;transition:border-color .15s, box-shadow .15s;}
  .inp:focus,.area:focus{border-color:var(--violet);box-shadow:0 0 0 3px var(--violetSoft);}
  .area{resize:vertical;line-height:1.55;}
  .area.en{min-height:70px;font-size:15px;}
  .area.ko{min-height:56px;}
  .btn-row{display:flex;gap:9px;align-items:center;margin-top:4px;}
  .ghost{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:12px;font-family:var(--body);font-size:14px;color:var(--soft);cursor:pointer;}
  .solid{flex:1;border:none;border-radius:12px;padding:12px;font-family:var(--body);font-size:14px;font-weight:700;color:#fff;cursor:pointer;background:linear-gradient(135deg,#a8543a,#8c3f2c);}
  .danger-link{flex:0 0 auto;border:none;background:transparent;color:var(--rose);font-weight:700;font-size:14px;cursor:pointer;padding:0 6px;}
  .mtext{font-size:13px;color:var(--soft);line-height:1.6;text-align:center;margin:0 0 16px;}
  .mtitle.center{text-align:center;margin-bottom:8px;}

  @keyframes twinkle{0%,100%{opacity:.9}50%{opacity:.25}}
  @keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes starPop{0%{transform:scale(.4) rotate(-20deg);opacity:0}60%{transform:scale(1.25) rotate(6deg);opacity:1}100%{transform:scale(1) rotate(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>

<div class="sky" id="sky">
  <div class="disc" id="disc"></div>
  <div id="starField"></div>
  <div class="sky-in">
    <div class="eyebrow">EBS FM · 입이 트이는 영어</div>
    <h1 class="hello" id="hello"></h1>
    <div class="sky-date"><span id="skyDate"></span><span class="streak" id="streak"></span></div>
  </div>
</div>

<div class="wrap">
  <div class="summary">
    <div style="flex:1;min-width:130px;">
      <div class="lbl">모은 별 (외운 문장)</div>
      <div class="num"><span class="st" id="memCount">★ 0</span> <span class="tot" id="totCount">/ 0문장</span></div>
    </div>
    <button class="btn review" id="reviewBtn">복습하기</button>
    <button class="btn add" id="addDayBtn">＋ 오늘 문장</button>
    <div class="hidewrap" id="hideWrap">
      <button class="hideopt on" id="hideKo">한글 가리기</button>
      <button class="hideopt" id="hideEn">영어 가리기</button>
    </div>
  </div>

  <div id="list"></div>

  <div class="trash-wrap" id="trashWrap"></div>
  <p class="footnote">하늘은 지금 시간을 따라 바뀌어요 — 새벽, 아침, 낮, 노을, 그리고 별이 뜨는 밤.</p>
  <div class="status" id="status"></div>
</div>

<!-- 날짜 추가 모달 -->
<div class="back" id="addBack">
  <div class="modal">
    <div class="mtitle">오늘 문장 추가</div>
    <div class="field"><label>날짜</label><input class="inp" type="date" id="addDate" /></div>
    <div class="field"><label>방송 주제 (선택)</label><input class="inp" id="addTitle" placeholder="예: 주말 계획 이야기하기" /></div>
    <div class="btn-row"><button class="ghost" id="addCancel">취소</button><button class="solid" id="addOk">추가</button></div>
  </div>
</div>

<!-- 문장 편집 모달 -->
<div class="back" id="editBack">
  <div class="modal">
    <div class="mtitle" id="editTitle">문장 추가</div>
    <div class="field"><label>영어 문장</label><textarea class="area en" id="eEn" placeholder="English sentence"></textarea></div>
    <div class="field"><label>한글 뜻</label><textarea class="area ko" id="eKo" placeholder="우리말 뜻"></textarea></div>
    <div class="btn-row">
      <button class="danger-link" id="eDelete" style="display:none">삭제</button>
      <button class="ghost" id="eCancel">취소</button>
      <button class="solid" id="eSave">저장</button>
    </div>
  </div>
</div>

<!-- 하루 삭제 확인 모달 -->
<div class="back" id="delBack">
  <div class="modal">
    <div class="mtitle center">이 날 기록을 삭제할까요?</div>
    <p class="mtext" id="delText"></p>
    <div class="btn-row"><button class="ghost" id="delCancel">취소</button><button class="solid" id="delOk">삭제하기</button></div>
  </div>
</div>

<!-- 비밀번호 모달 (영구 삭제) -->
<div class="back" id="pinBack">
  <div class="modal">
    <div class="mtitle center">영구 삭제</div>
    <p class="mtext" id="pinText"></p>
    <div class="field"><label>비밀번호</label><input class="inp" type="password" id="pinInput" inputmode="numeric" placeholder="••••" /></div>
    <p class="mtext" id="pinErr" style="color:var(--rose);display:none;margin-bottom:10px;">비밀번호가 맞지 않아요.</p>
    <div class="btn-row"><button class="ghost" id="pinCancel">취소</button><button class="solid" id="pinOk">영구 삭제</button></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   ★ 공유 설정 (한 번만)
     함께 드린 Code.gs로 "새 구글 시트 + Apps Script"를 배포하고,
     웹앱 주소(.../exec)를 아래 "" 안에 붙여넣으세요.
     비워두면 이 기기에만 저장됩니다(테스트용).
   ══════════════════════════════════════════════════════════════ */
const CONFIG = {
  API_URL: "",   // 예) "https://script.google.com/macros/s/AKfy...../exec"
  OWNER_PIN: ""  // 로컬 테스트용. 실제 보안은 Code.gs의 OWNER_PIN이 담당합니다.
};
/* ══════════════════════════════════════════════════════════════ */

const LS_KEY = "iptyeong-memo";
const shared = () => !!CONFIG.API_URL;

const WD = ["일","월","화","수","목","금","토"];
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const pad = n => String(n).padStart(2,"0");
const iso = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayIso = () => iso(new Date());
function toDate(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function fmtK(s){ const dt=toDate(s); return `${dt.getMonth()+1}월 ${dt.getDate()}일 ${WD[dt.getDay()]}요일`; }
const uid = () => "s"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const tid = () => "t"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const trunc = (s,n)=>{ s=s||""; return s.length>n ? s.slice(0,n)+"…" : s; };

/* state.days = { "YYYY-MM-DD": { title:"", sentences:[{id,en,ko,memorized}] } } */
let state = { days:{}, trash:[] };
/* ── 받아 적은 문장 (저장소가 비어 있을 때 처음 한 번만 채워짐) ── */
const SEED = { days: {
  "2026-06-08": { title: "", sentences: [
    { id:"se260608a", en:"I like to top it with some sesame oil.", ko:"전 참기름을 조금 뿌려서 먹는 걸 좋아해요.", memorized:false },
    { id:"se260608b", en:"It's easier than you think.", ko:"생각보다 쉬워요.", memorized:false },
    { id:"se260608c", en:"There is no comparison.", ko:"비교가 안 돼요.", memorized:false }
  ]},
  "2026-06-09": { title: "", sentences: [
    { id:"se260609a", en:"I felt a weight on my mind.", ko:"마음이 무겁더라고요.", memorized:false },
    { id:"se260609b", en:"I have kept it up ever since 2022.", ko:"2022년부터 지금까지 쭉 해오고 있어요.", memorized:false }
  ]},
  "2026-06-10": { title: "", sentences: [
    { id:"se260610a", en:"The look and taste both change depending on what goes in.", ko:"들어가는 재료에 따라 모양과 맛이 다양해져요.", memorized:false },
    { id:"se260610b", en:"I didn't have anything going on that day.", ko:"나는 그날 별일 없이 한가했어요.", memorized:false }
  ]},
  "2026-06-11": { title: "", sentences: [
    { id:"se260611a", en:"It can be tricky if you don't plan ahead.", ko:"사전에 계획을 세우지 않으면 곤란해질 수 있어요.", memorized:false },
    { id:"se260611b", en:"I bought her lunch as a thank-you.", ko:"나는 그녀에게 답례로 점심을 사 줬어요.", memorized:false }
  ]},
  "2026-06-05": { title: "", sentences: [
    { id:"se260605a", en:"It's a great natural drink for quenching thirst.", ko:"갈증 해소에 좋은 천연 음료예요.", memorized:false },
    { id:"se260605b", en:"The flesh can be eaten as is.", ko:"과육은 그대로 먹어도 돼요.", memorized:false },
    { id:"se260605c", en:"Nothing goes to waste.", ko:"버릴 게 하나도 없어요.", memorized:false }
  ]},
  "2026-06-04": { title: "", sentences: [
    { id:"se260604a", en:"My friends said they would stand by me.", ko:"친구들은 내 곁을 지켜 주겠다고 말했어요.", memorized:false },
    { id:"se260604b", en:"I'm not sure if it was by choice or by circumstance.", ko:"안 한 건지 못 한 건지는 잘 모르겠어요.", memorized:false }
  ]},
  "2026-06-03": { title: "", sentences: [
    { id:"se260603a", en:"The thought had crossed my mind before.", ko:"예전에도 그런 생각이 문득 떠오른 적이 있었어요.", memorized:false },

/* ── 저장소 ── */
function jsonpGet(url){
  return new Promise((resolve,reject)=>{
    const cb="__cb_"+Math.random().toString(36).slice(2);
    const sep=url.indexOf("?")>=0?"&":"?";
    const s=document.createElement("script");
    const timer=setTimeout(()=>{cleanup();reject(new Error("timeout"));},12000);
    function cleanup(){ try{delete window[cb];}catch(e){} s.remove(); clearTimeout(timer); }
    window[cb]=data=>{ cleanup(); resolve(data||{}); };
    s.onerror=()=>{ cleanup(); reject(new Error("network")); };
    s.src=url+sep+"callback="+cb+"&t="+Date.now();
    document.body.appendChild(s);
  });
}
async function fetchData(){
  if(!shared()){
    try{ var v=JSON.parse(localStorage.getItem(LS_KEY))||{days:{},trash:[]}; if(!v.trash)v.trash=[]; if(!v.days)v.days={}; return v; }
    catch(e){ return { days:{}, trash:[] }; }
  }
  const r = await jsonpGet(CONFIG.API_URL);
  if(!r.days) r.days={};
  if(!r.trash) r.trash=[];
  return r;
}
async function postAction(payload){
  if(!shared()){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
    return;
  }
  await fetch(CONFIG.API_URL, {
    method:"POST", mode:"no-cors",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
}

/* ── 통계 ── */
function calcStats(){
  let total=0, mem=0;
  Object.values(state.days).forEach(d=>(d.sentences||[]).forEach(s=>{ total++; if(s.memorized) mem++; }));
  const has = new Set(Object.keys(state.days).filter(k=>(state.days[k].sentences||[]).length>0));
  let streak=0; const cur=new Date();
  if(!has.has(iso(cur))) cur.setDate(cur.getDate()-1);
  while(has.has(iso(cur))){ streak++; cur.setDate(cur.getDate()-1); }
  return { total, mem, streak };
}

function render(){
  if(!state.trash) state.trash=[];
  renderTrash();
  const st = calcStats();
  document.getElementById("memCount").textContent = `★ ${st.mem}`;
  document.getElementById("totCount").textContent = `/ ${st.total}문장`;
  document.getElementById("streak").textContent = st.streak>0 ? `🔥 ${st.streak}일 연속` : "";
  const rb = document.getElementById("reviewBtn");
  rb.classList.toggle("on", review);
  rb.textContent = review ? "복습 중 ✓" : "복습하기";

  const dates = Object.keys(state.days).sort().reverse();
  const list = document.getElementById("list");
  if(dates.length===0){
    list.innerHTML = `<div class="empty-state">첫 문장을 기다리고 있어요.<br><b>＋ 오늘 문장</b>으로 시작해 보세요.</div>`;
    return;
  }
  list.innerHTML = dates.map(date=>{
    const d=state.days[date];
    const sents=d.sentences||[];
    const dm=sents.filter(s=>s.memorized).length;
    const rows=sents.map(s=>{
      const koHidden = review && reviewHide==="ko" && !revealed.has(s.id);
      const enHidden = review && reviewHide==="en" && !revealed.has(s.id);
      const enHtml = enHidden
        ? `<div class="en blurred" data-reveal="${s.id}">${s.en?esc(s.en):'(영어 문장)'}<span class="hint">탭하여 보기</span></div>`
        : `<div class="en">${s.en?esc(s.en):'<span class="ph">(영어 문장)</span>'}</div>`;
      const koHtml = koHidden
        ? `<div class="ko blurred" data-reveal="${s.id}">${esc(s.ko)||"—"}<span class="hint">탭하여 보기</span></div>`
        : `<div class="ko">${esc(s.ko)}</div>`;
      return `<div class="sent${s.memorized?" mem":""}">
        ${enHtml}
        ${koHtml}
        <div class="foot">
          <div class="foot-left">
            <button class="speakbtn" data-speak="${s.id}" title="듣기">듣기</button>
            <button class="editbtn" data-edit-d="${date}" data-edit-s="${s.id}" title="쓰기">쓰기</button>
          </div>
          <button class="membtn${s.memorized?" on":""}" data-mem-d="${date}" data-mem-s="${s.id}" title="외움 표시">
            ${s.memorized?'<span class="pop">★</span>':'☆'}
          </button>
        </div>
      </div>`;
    }).join("");
    const col = collapsed.has(date);
    const allDone = sents.length>0 && dm===sents.length;
    const isToday = date===todayIso();
    const cls = "day" + (col?" collapsed":"") + (allDone?" done":"") + (isToday?" today":"");
    return `<section class="${cls}">
      <div class="dhead">
        <h2 class="dtoggle" data-collapse="${date}">${fmtK(date)} <span class="chev">${col?"▸":"▾"}</span></h2>
        <span class="ln"></span>
        ${allDone?`<span class="daydone-badge">${isToday?"✨ 오늘 완성!":"완성"}</span>`:""}
        <span class="dstar">★ ${dm}</span>
        <button class="del" data-del="${date}">삭제</button>
      </div>
      ${col ? "" : `${d.title?`<div class="dtopic">📻 ${esc(d.title)}</div>`:""}<div class="sents">${rows}<button class="addsent" data-add="${date}">＋ 문장 추가</button></div>`}
    </section>`;
  }).join("");
  markSpeaking();
}

function setStatus(t){ document.getElementById("status").textContent=t; }

async function sync(){
  try{
    state = await fetchData();
    if(!state.days) state.days={};
    if(!state.trash) state.trash=[];
    // 시드 병합: 아직 없는 날짜/문장만 채워 넣음 (기존 내용·삭제는 보존)
    const storeEmpty = Object.keys(state.days).length===0;
    if(!alreadySeeded() || (shared() && storeEmpty)){
      let changed=false;
      for(const date in SEED.days){
        if(!state.days[date]){ state.days[date]=JSON.parse(JSON.stringify(SEED.days[date])); changed=true; }
        else {
          const ids=new Set((state.days[date].sentences||[]).map(s=>s.id));
          SEED.days[date].sentences.forEach(s=>{ if(!ids.has(s.id)){ state.days[date].sentences.push(JSON.parse(JSON.stringify(s))); changed=true; } });
        }
      }
      if(changed){
        if(shared()){ await postAction({ full: state }); }
        else { try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }
      }
      markSeeded();
    }
    render();
    setStatus(shared() ? "모두와 공유 중 · 동기화 완료" : "이 기기에만 저장됨 (공유 설정 안 됨)");
  }catch(e){
    setStatus("동기화 실패 — 잠시 후 다시 시도하세요");
  }
}

async function upsertSentence(date, sentId, en, ko, memorized){
  if(!state.days[date]) state.days[date]={ title:"", sentences:[] };
  const arr = state.days[date].sentences;
  const i = arr.findIndex(s=>s.id===sentId);
  const obj = { id:sentId, en, ko, memorized:!!memorized };
  if(i>=0) arr[i]=obj; else arr.push(obj);
  render();
  await postAction({ upsertSentence:{ date, sentence:obj } });
}

  document.getElementById("hideWrap").classList.toggle("on", review);
  render();
});
function setHide(side){
  reviewHide=side; revealed=new Set();
  document.getElementById("hideKo").classList.toggle("on", side==="ko");
  document.getElementById("hideEn").classList.toggle("on", side==="en");
  render();
}
document.getElementById("hideKo").addEventListener("click", ()=>setHide("ko"));
document.getElementById("hideEn").addEventListener("click", ()=>setHide("en"));

/* ── 영어 읽어주기 (브라우저 내장 TTS, 음원 파일 불필요) ── */
const ttsSupported = ("speechSynthesis" in window);
function pickEnVoice(){
  try{
    const vs = window.speechSynthesis.getVoices() || [];
    return vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null;
  }catch(e){ return null; }
}
function speak(id){
  if(!ttsSupported) return;
  // 같은 문장을 다시 누르면 멈춤
  if(speakingId===id){ window.speechSynthesis.cancel(); speakingId=null; markSpeaking(); return; }
  const s = findSentence(id);
  if(!s || !s.en){ return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(s.en);
  u.lang = "en-US";
  u.rate = 1.0;
  const v = pickEnVoice(); if(v) u.voice = v;
  u.onend = ()=>{ if(speakingId===id){ speakingId=null; markSpeaking(); } };
  u.onerror = ()=>{ if(speakingId===id){ speakingId=null; markSpeaking(); } };
  speakingId = id; markSpeaking();
  window.speechSynthesis.speak(u);
}
function findSentence(id){
  for(const date in state.days){
    const f=(state.days[date].sentences||[]).find(x=>x.id===id);
    if(f) return f;
  }
  return null;
}
// 재생 중 버튼 표시만 갱신 (전체 render 안 함)
function markSpeaking(){
  document.querySelectorAll("[data-speak]").forEach(b=>{
    b.classList.toggle("playing", b.getAttribute("data-speak")===speakingId);
  });
}
// 일부 브라우저는 voices 로딩이 비동기
if(ttsSupported && window.speechSynthesis.onvoiceschanged !== undefined){
  window.speechSynthesis.onvoiceschanged = ()=>{};
}

/* 편집 모달 */
function openEdit(date, sentId){
  editTarget={ date, sentId };
  const s = sentId ? (state.days[date].sentences||[]).find(x=>x.id===sentId) : null;
  document.getElementById("editTitle").textContent = sentId ? "문장 고치기" : "문장 추가";
  document.getElementById("eEn").value = s ? s.en : "";
  document.getElementById("eKo").value = s ? s.ko : "";
  document.getElementById("eDelete").style.display = sentId ? "block" : "none";
  document.getElementById("editBack").classList.add("on");
}
function closeEdit(){ document.getElementById("editBack").classList.remove("on"); editTarget=null; }
document.getElementById("eCancel").addEventListener("click", closeEdit);
document.getElementById("editBack").addEventListener("click", e=>{ if(e.target.id==="editBack") closeEdit(); });
document.getElementById("eSave").addEventListener("click", async ()=>{
  if(!editTarget) return;
  const en=document.getElementById("eEn").value.trim();
  const ko=document.getElementById("eKo").value.trim();
  if(!en && !ko){ closeEdit(); return; }
  const { date } = editTarget;
  const sentId = editTarget.sentId || uid();
  const prev = editTarget.sentId ? (state.days[date].sentences||[]).find(x=>x.id===sentId) : null;
  closeEdit();
  await upsertSentence(date, sentId, en, ko, prev?prev.memorized:false);
});
document.getElementById("eDelete").addEventListener("click", async ()=>{
  if(!editTarget || !editTarget.sentId) return;
  const { date, sentId } = editTarget;
  const arr = state.days[date].sentences||[];
  const s = arr.find(x=>x.id===sentId);
  state.days[date].sentences = arr.filter(x=>x.id!==sentId);
  const ttid = tid();
  if(s){ if(!state.trash) state.trash=[]; state.trash.unshift({ tid:ttid, type:"sentence", date, sentence:s, label:trunc(s.en||s.ko,40), deletedAt:Date.now() }); }
  closeEdit(); render();
  await postAction({ deleteSentence:{ date, sentId, tid:ttid } });
});

/* 하루 삭제 */
function openDel(date){
  delTarget=date;
  document.getElementById("delText").innerHTML = `${fmtK(date)} 기록(문장 ${ (state.days[date].sentences||[]).length }개)이 휴지통으로 이동돼요.<br>언제든 복구할 수 있어요.`;
  document.getElementById("delBack").classList.add("on");
}
document.getElementById("delCancel").addEventListener("click", ()=>{ document.getElementById("delBack").classList.remove("on"); delTarget=null; });
document.getElementById("delBack").addEventListener("click", e=>{ if(e.target.id==="delBack"){ e.target.classList.remove("on"); delTarget=null; } });
document.getElementById("delOk").addEventListener("click", async ()=>{
  if(!delTarget) return;
  const d=delTarget;
  const day=state.days[d];
  const ttid=tid();
  delete state.days[d];
  if(day){ if(!state.trash) state.trash=[]; state.trash.unshift({ tid:ttid, type:"day", date:d, day, label:fmtK(d)+" (하루 전체)", deletedAt:Date.now() }); }
  document.getElementById("delBack").classList.remove("on"); delTarget=null;
  render();
  await postAction({ deleteDay:{ date:d, tid:ttid } });
});

/* ── 휴지통 ── */
function renderTrash(){
  const wrap=document.getElementById("trashWrap");
  const trash=state.trash||[];
  if(trash.length===0){ wrap.innerHTML=""; return; }
  const open = wrap.getAttribute("data-open")==="1";
  let html = `<button class="trash-toggle" id="trashToggle">🗑 삭제한 항목 ${trash.length}개 ${open?"접기":"보기"}</button>`;
  if(open){
    html += `<div class="trash-panel"><div class="trash-actions"><button class="t-restore-all" id="tRestoreAll">전체 복구</button><button class="t-empty" id="tEmpty">휴지통 비우기</button></div>` +
      trash.map(it=>{
        const dt=new Date(it.deletedAt||Date.now());
        const when=`${dt.getMonth()+1}/${dt.getDate()} 삭제`;
        const tag = it.type==="day" ? "하루 전체" : "문장";
        return `<div class="trash-item"><div class="ti-main"><div class="ti-label">${esc(it.label||"")}</div><div class="ti-sub">${tag} · ${when}</div></div><button class="ti-restore" data-trestore="${it.tid}">복구</button><button class="ti-purge" data-tpurge="${it.tid}">영구삭제</button></div>`;
      }).join("") + `</div>`;
  }
  wrap.innerHTML=html;
}
function restoreInto(it){
  if(!state.days) state.days={};
  if(it.type==="day"){
    const ex=state.days[it.date];
    if(!ex) state.days[it.date]=it.day;
    else { const ids=new Set((ex.sentences||[]).map(s=>s.id)); (it.day.sentences||[]).forEach(s=>{ if(!ids.has(s.id)) ex.sentences.push(s); }); if(!ex.title && it.day.title) ex.title=it.day.title; }
  } else {
    if(!state.days[it.date]) state.days[it.date]={ title:"", sentences:[] };
    const arr=state.days[it.date].sentences;
    if(!arr.some(s=>s.id===it.sentence.id)) arr.push(it.sentence);
  }
}
async function restoreOne(t){
  const it=(state.trash||[]).find(x=>x.tid===t); if(!it) return;
  restoreInto(it);
  state.trash=(state.trash||[]).filter(x=>x.tid!==t);
  render();
  await postAction({ restoreTrash:{ tid:t } });
}
async function restoreAll(){
  (state.trash||[]).forEach(restoreInto);
  state.trash=[];
  render();
  await postAction({ restoreAllTrash:true });
}
function openPin(desc){
  pinAction=desc;
  document.getElementById("pinText").textContent = desc.text;
  document.getElementById("pinInput").value="";
  document.getElementById("pinErr").style.display="none";
  document.getElementById("pinBack").classList.add("on");
  setTimeout(()=>{ try{ document.getElementById("pinInput").focus(); }catch(e){} }, 60);
}
function closePin(){ document.getElementById("pinBack").classList.remove("on"); pinAction=null; }
document.getElementById("pinCancel").addEventListener("click", closePin);
document.getElementById("pinBack").addEventListener("click", e=>{ if(e.target.id==="pinBack") closePin(); });
document.getElementById("pinOk").addEventListener("click", async ()=>{
  if(!pinAction) return;
  const pin=document.getElementById("pinInput").value;
  if(!shared()){
    // 로컬 테스트: CONFIG.OWNER_PIN과 비교 (비어 있으면 통과)
    if(CONFIG.OWNER_PIN && pin!==CONFIG.OWNER_PIN){ document.getElementById("pinErr").style.display="block"; return; }
    if(pinAction.type==="one") state.trash=(state.trash||[]).filter(x=>x.tid!==pinAction.tid);
    else state.trash=[];
    try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
    closePin(); render(); return;
  }
  // 공유 모드: 서버(Code.gs OWNER_PIN)가 검증
  if(pinAction.type==="one") await postAction({ purgeTrash:{ tid:pinAction.tid, pin } });
  else await postAction({ emptyTrash:{ pin } });
  closePin();
  setStatus("영구 삭제 요청 중…");
  setTimeout(sync, 900);
});
document.getElementById("trashWrap").addEventListener("click", e=>{
  const tg=e.target.closest("#trashToggle");
  if(tg){ const w=document.getElementById("trashWrap"); w.setAttribute("data-open", w.getAttribute("data-open")==="1"?"0":"1"); renderTrash(); return; }
  if(e.target.closest("#tRestoreAll")){ restoreAll(); return; }
  if(e.target.closest("#tEmpty")){ openPin({ type:"all", text:"휴지통의 모든 항목을 영구히 삭제합니다. 되돌릴 수 없어요." }); return; }
  const rs=e.target.closest("[data-trestore]"); if(rs){ restoreOne(rs.getAttribute("data-trestore")); return; }
  const pg=e.target.closest("[data-tpurge]"); if(pg){ openPin({ type:"one", tid:pg.getAttribute("data-tpurge"), text:"이 항목을 영구히 삭제합니다. 되돌릴 수 없어요." }); }
});

/* 목록 위임 클릭 */
document.getElementById("list").addEventListener("click", e=>{
  const cl=e.target.closest("[data-collapse]");
  if(cl){ const dt=cl.getAttribute("data-collapse"); if(collapsed.has(dt)) collapsed.delete(dt); else collapsed.add(dt); render(); return; }
  const sp=e.target.closest("[data-speak]");
  if(sp){ speak(sp.getAttribute("data-speak")); return; }
  const mem=e.target.closest("[data-mem-s]");
  if(mem){
    const date=mem.getAttribute("data-mem-d"), id=mem.getAttribute("data-mem-s");
    const s=(state.days[date].sentences||[]).find(x=>x.id===id);
    if(s) upsertSentence(date, id, s.en, s.ko, !s.memorized);
    return;
  }
  const rv=e.target.closest("[data-reveal]");
  if(rv){ revealed.add(rv.getAttribute("data-reveal")); render(); return; }
  const ed=e.target.closest("[data-edit-s]");
  if(ed){ openEdit(ed.getAttribute("data-edit-d"), ed.getAttribute("data-edit-s")); return; }
  const ad=e.target.closest("[data-add]");
  if(ad){ openEdit(ad.getAttribute("data-add"), null); return; }
  const dl=e.target.closest("[data-del]");
  if(dl){ openDel(dl.getAttribute("data-del")); }
});

document.addEventListener("visibilitychange", ()=>{ if(!document.hidden){ paintSky(); sync(); } });

/* ── 시작 ── */
paintSky();
render();
sync();
</script>
